<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Inkwell{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ url_for('index') }}" class="logo">
        <span class="logo-ink">Ink</span><span class="logo-well">well</span>
      </a>
      <nav class="nav-links">
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('albums') }}">Albums</a>
        <a href="{{ url_for('create_post') }}" class="btn-write">+ Write</a>
      </nav>
    </div>
  </header>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-container">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">
              {{ message }}
              <button class="flash-close" onclick="this.parentElement.remove()">✕</button>
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-logo">Inkwell</span>
      <span class="footer-copy">A place for words that matter.</span>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
